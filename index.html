<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>eagle15</title>
  <style>
    html, body { margin:0; height:100%; background:#05070c; color:#e6e6e6; font-family:system-ui, Arial; }
    canvas { display:block; width:100vw; height:100vh; }

    /* единый root для DOM-UI поверх canvas */
    #ui-root {
      position: fixed;
      inset: 0;
      z-index: 2000;
      pointer-events: none; /* по умолчанию клики не ловим */
    }
    /* но сами экраны/кнопки будут включать pointer-events:auto */
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <div id="ui-root"></div>
  <script type="module" src="./main.js"></script>
</body>
</html>
